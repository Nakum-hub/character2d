<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>character2d — live model</title>
<style>
  :root{ --bg:#0e1014; --mint:#5eead4; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:radial-gradient(120% 120% at 50% 18%,#1a1f29 0%,#0e1014 60%,#080a0d 100%);
       font-family:ui-monospace,"SF Mono",Menlo,monospace;color:#cfd6e4;overflow:hidden;}
  #stage{position:fixed;inset:0;display:grid;place-items:center;cursor:crosshair;}
  canvas{display:block;filter:drop-shadow(0 40px 60px rgba(0,0,0,.55));}
  .hint{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);font-size:12px;
        letter-spacing:.04em;color:#8893a7;opacity:.85;text-align:center;line-height:1.7}
  .hint b{color:var(--mint)}
  .tag{position:fixed;top:18px;left:20px;font-size:11px;color:#5b6677;letter-spacing:.12em}
  .btns{position:fixed;top:16px;right:16px;display:flex;gap:8px}
  .btns button{font:inherit;font-size:11px;letter-spacing:.05em;color:#cfd6e4;background:rgba(255,255,255,.06);
        border:1px solid rgba(255,255,255,.12);padding:7px 12px;border-radius:999px;cursor:pointer;transition:.2s}
  .btns button:hover{background:rgba(94,234,212,.14);border-color:var(--mint);color:#fff}
</style>
</head>
<body>
  <div class="tag">character2d · live model</div>
  <div class="btns">
    <button data-g="tilt">tilt</button>
    <button data-g="nod">nod</button>
    <button data-g="shake">shake</button>
    <button data-g="perk">perk</button>
  </div>
  <div id="stage"><canvas id="c"></canvas></div>
  <div class="hint">move your cursor — he follows your gaze · <b>click</b> him to react · resize freely</div>

<script>
// ----- model data (from web/parts/layout.json) -----
const LAYOUT = {
  canvas:{w:1536,h:2730},
  parts:[
    {name:"body", x:436, y:545, pivot:[774,1680], z:10},
    {name:"head", x:609, y:284, pivot:[778,642],  z:20}
  ]
};

// ----- tiny rig runtime -----
const cv = document.getElementById('c'), ctx = cv.getContext('2d');
const imgs = {}; let ready=false;
function load(){
  let n=0; const parts=LAYOUT.parts;
  parts.forEach(p=>{
    const im=new Image();
    im.onload=()=>{ if(++n===parts.length){ ready=true; } };
    im.onerror=()=>{ if(++n===parts.length){ ready=true; } };
    im.src="parts/"+p.name+".png";
    imgs[p.name]=im;
  });
}
load();

// parameters an animator / AI agent drives. range roughly [-1,1] or [0,1]
const P = { headYaw:0, headPitch:0, headRoll:0, bodyLean:0, breath:0, bob:0, gestureYaw:0, gesturePitch:0, scalePop:0 };

// ---------- gesture system (so AI agents can author motions later) ----------
const easeInOut = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
let activeGesture=null;
const GESTURES = {
  // each: duration ms + fn(progress 0..1) -> partial param overrides (additive on gesture* channels)
  nod:  {dur:850, fn:p=>({gesturePitch: Math.sin(p*Math.PI*2)*0.55})},
  shake:{dur:850, fn:p=>({gestureYaw:  Math.sin(p*Math.PI*4)*0.5})},
  perk: {dur:700, fn:p=>({scalePop: Math.sin(p*Math.PI)*0.05, gesturePitch:-Math.sin(p*Math.PI)*0.3})},
  tilt: {dur:950, fn:p=>({headRollK: Math.sin(p*Math.PI)*0.18, gestureYaw: Math.sin(p*Math.PI)*0.16})}
};
function playGesture(name){
  if(!GESTURES[name]) return;
  activeGesture={name, start:performance.now(), dur:GESTURES[name].dur, fn:GESTURES[name].fn};
}
function registerGesture(name,dur,fn){ GESTURES[name]={dur,fn}; }

// ---------- gaze target ----------
let target={x:0,y:0}, smoothed={x:0,y:0};
let lastPointer=performance.now(), pointerActive=false;
addEventListener('pointermove', e=>{
  const r=cv.getBoundingClientRect();
  target.x = Math.max(-1,Math.min(1,(e.clientX-(r.left+r.width/2))/(r.width/2)));
  target.y = Math.max(-1,Math.min(1,(e.clientY-(r.top+r.height*0.32))/(r.height/2)));
  lastPointer=performance.now(); pointerActive=true;
});
addEventListener('pointerleave',()=>pointerActive=false);
document.getElementById('stage').addEventListener('pointerdown',()=>playGesture(Math.random()<.5?'nod':'perk'));
document.querySelectorAll('.btns button').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();playGesture(b.dataset.g);}));

// ---------- public API for AI gesture-agents ----------
window.character = {
  setParam:(k,v)=>{ if(k in P) P[k]=v; },
  getParam:k=>P[k],
  lookAt:(clientX,clientY)=>{ const r=cv.getBoundingClientRect();
     target.x=Math.max(-1,Math.min(1,(clientX-(r.left+r.width/2))/(r.width/2)));
     target.y=Math.max(-1,Math.min(1,(clientY-(r.top+r.height*0.32))/(r.height/2)));
     lastPointer=performance.now(); pointerActive=true; },
  playGesture, registerGesture, gestures:()=>Object.keys(GESTURES)
};

// ---------- layout / fit ----------
let DPR=1, scale=1, originX=0, originY=0;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  const W=innerWidth, H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px';
  const figW=694, figH=2398, figX=436, figY=284;
  const margin=0.86;
  scale=Math.min(W/figW, H/figH)*margin;
  originX=W/2 - (figX+figW/2)*scale;
  originY=H*0.97 - (figY+figH)*scale;   // anchor near bottom
}
addEventListener('resize',resize); resize();

// ---------- affine helper: transform about pivot ----------
function partTransform(piv, theta, sx, sy, shear, tx, ty){
  const c=Math.cos(theta), s=Math.sin(theta);
  // M = R @ shear @ scale
  const m00=c*sx - s*0,         m01=c*shear*sy - s*sy;
  const m10=s*sx + c*0,         m11=s*shear*sy + c*sy;
  ctx.translate(piv[0]+tx, piv[1]+ty);
  ctx.transform(m00,m10,m01,m11,0,0);
  ctx.translate(-piv[0],-piv[1]);
}

// ---------- render ----------
let t0=performance.now();
function frame(now){
  const t=(now-t0)/1000;
  // idle auto-gaze when pointer inactive
  if(!pointerActive || now-lastPointer>2600){
    target.x=Math.sin(t*0.55)*0.55 + Math.sin(t*0.23)*0.2;
    target.y=Math.sin(t*0.4+1)*0.28;
  }
  smoothed.x += (target.x-smoothed.x)*0.06;
  smoothed.y += (target.y-smoothed.y)*0.06;

  // gesture channels
  let g={gestureYaw:0,gesturePitch:0,scalePop:0,headRollK:0};
  if(activeGesture){
    const p=(now-activeGesture.start)/activeGesture.dur;
    if(p>=1){ activeGesture=null; }
    else Object.assign(g, activeGesture.fn(p));
  }

  // breathing + drift
  const breath=Math.sin(t*1.6);
  P.headYaw=smoothed.x; P.headPitch=smoothed.y;
  P.bodyLean=smoothed.x*0.5; P.breath=breath;

  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save();
  ctx.translate(originX,originY); ctx.scale(scale,scale);

  // soft ground shadow
  ctx.save();
  ctx.translate(LAYOUT.canvas.w/2-12, 2670);
  ctx.scale(1,0.16); ctx.beginPath(); ctx.arc(0,0,220,0,7); 
  ctx.fillStyle="rgba(0,0,0,0.33)"; ctx.fill(); ctx.restore();

  const bodyBob=2*breath, yaw=P.headYaw, pitch=P.headPitch;

  // BODY
  const body=LAYOUT.parts[0];
  ctx.save();
  partTransform(body.pivot, (P.bodyLean*0.022), 1, 1+0.004*breath, 0, P.bodyLean*10, bodyBob);
  if(imgs.body.complete) ctx.drawImage(imgs.body, body.x, body.y);
  ctx.restore();

  // HEAD  (pseudo-3D: horizontal squash + shear + translate about neck)
  const head=LAYOUT.parts[1];
  const yawA=yaw+g.gestureYaw;
  const pop=1+(g.scalePop||0);
  ctx.save();
  partTransform(
     head.pivot,
     (yawA*0.05) + (g.headRollK||0),            // roll
     (1-0.13*Math.abs(yawA))*pop,               // x squash = turn
     (1+0.05*(pitch+g.gesturePitch))*pop,       // y stretch on pitch
     0.06*yawA,                                 // shear
     26*yawA,                                   // x shift
     bodyBob*0.9 + (pitch+g.gesturePitch)*30    // y shift on pitch + bob
  );
  if(imgs.head.complete) ctx.drawImage(imgs.head, head.x, head.y);
  ctx.restore();

  ctx.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
