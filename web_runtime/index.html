<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>character2d — live model</title>
<style>
  :root{--mint:#5eead4}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:ui-monospace,Menlo,monospace;color:#cfd6e4;overflow:hidden}
  body{background:radial-gradient(120% 120% at 50% 15%,#1b2030 0%,#0d1017 60%,#070a0e 100%)}
  #stage{position:fixed;inset:0;display:grid;place-items:center;cursor:crosshair}
  canvas{display:block;filter:drop-shadow(0 40px 70px rgba(0,0,0,.6))}
  .bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
  .bar button{font:inherit;font-size:12px;color:#cfd6e4;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    padding:8px 14px;border-radius:999px;cursor:pointer;transition:.2s}
  .bar button:hover{background:rgba(94,234,212,.16);border-color:var(--mint);color:#fff}
  .tag{position:fixed;top:16px;left:18px;font-size:11px;color:#5b6677;letter-spacing:.1em}
  .hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:12px;color:#8893a7}
  .hint b{color:var(--mint)}
</style></head>
<body>
<div class="tag">character2d · live model</div>
<div class="bar">
  <button onclick="character.narrate('Hi! I\'m the guide for this portfolio. Let me walk you through the projects, skills, and experience.')">▶ narrate</button>
  <button onclick="character.playGesture('nod')">nod</button>
  <button onclick="character.setEmotion('joy')">smile</button>
  <button onclick="character.setEmotion('neutral')">neutral</button>
</div>
<div id="stage"><canvas id="c"></canvas></div>
<div class="hint">move your cursor — he follows your gaze · click <b>▶ narrate</b> to hear him speak</div>
<script>
// ---- model layout (from web_runtime/assets/layout.json) ----
const L = {"head_base": {"name": "head_base", "x": 609, "y": 284, "w": 343, "h": 421}, "eyes": {"name": "eyes", "x": 679, "y": 439, "w": 205, "h": 73}, "mouth": {"name": "mouth", "x": 735, "y": 549, "w": 91, "h": 49}, "body": {"name": "body", "x": 436, "y": 545, "w": 695, "h": 2138}, "back_hair": {"name": "back_hair", "x": 594, "y": 269, "w": 373, "h": 451}, "pivots": {"neck": [778, 660], "chest": [783, 950], "hip": [780, 1630], "eyeL": [838, 472], "eyeR": [725, 472], "mouth": [780, 572]}, "canvas": [1536, 2730], "head_bottom": 705};
const PARTS = ["back_hair","body","head_base","eyes","mouth"];
const imgs = {}; let ready=0;
PARTS.forEach(n=>{ const im=new Image(); im.onload=()=>ready++; im.src="assets/"+n+".png"; imgs[n]=im; });

// ---- animation state (params) ----
const S = { yaw:0,pitch:0,roll:0, tYaw:0,tPitch:0, breath:0, sway:0, blink:0, talk:0, smile:0, tSmile:0, nod:0 };
let pointerActive=false, lastMove=0, nextBlink=1.2, gesture=null;

// ---- interaction ----
addEventListener('pointermove',e=>{const r=cv.getBoundingClientRect();
  S.tYaw=Math.max(-1,Math.min(1,(e.clientX-(r.left+r.width/2))/(r.width*0.5)));
  S.tPitch=Math.max(-1,Math.min(1,(e.clientY-(r.top+r.height*0.32))/(r.height*0.5)));
  pointerActive=true; lastMove=performance.now();});
addEventListener('pointerdown',()=>character.playGesture('nod'));

// ---- public API (for the portfolio / AI narrator) ----
window.character = {
  setParam:(k,v)=>{ if(k in S) S[k]=v; },
  setEmotion:(e)=>{ S.tSmile = e==='joy'?0.7 : e==='happy'?0.5 : 0.0; },
  lookAt:(x,y)=>{ const r=cv.getBoundingClientRect(); S.tYaw=Math.max(-1,Math.min(1,(x-(r.left+r.width/2))/(r.width*.5))); S.tPitch=Math.max(-1,Math.min(1,(y-(r.top+r.height*.32))/(r.height*.5))); pointerActive=true; lastMove=performance.now(); },
  playGesture:(g)=>{ gesture={name:g,t:0}; },
  // speak + lip-flap; uses Web Speech if available, else times a flap
  narrate:(text)=>{
    S.tSmile=Math.max(S.tSmile,0.25);
    try{
      const u=new SpeechSynthesisUtterance(text); u.rate=1.0; u.pitch=1.0;
      let flap=setInterval(()=>{ S.talk=0.35+0.5*Math.random(); },90);
      u.onend=()=>{ clearInterval(flap); S.talk=0; S.tSmile=0.0; };
      u.onerror=()=>{ clearInterval(flap); S.talk=0; };
      speechSynthesis.cancel(); speechSynthesis.speak(u);
      // fallback stop after estimated duration
      setTimeout(()=>{ clearInterval(flap); S.talk=0; }, Math.min(20000, 400+text.length*70));
    }catch(e){
      let n=Math.min(60,text.length/3), i=0;
      let iv=setInterval(()=>{ S.talk=(i++%2)?0.7:0.15; if(i>n){clearInterval(iv);S.talk=0;S.tSmile=0;} },110);
    }
  }
};

// ---- render ----
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let DPR=1,scale=1,ox=0,oy=0;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); const W=innerWidth,H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';
  const fw=700,fh=2420,fx=436,fy=284; scale=Math.min(W/fw,H/fh)*0.9;
  ox=W/2-(fx+fw/2)*scale; oy=H*0.98-(fy+fh)*scale; }
addEventListener('resize',resize); resize();

function drawPart(name, fn){ const p=L[name], im=imgs[name]; if(!im||!im.complete) return;
  ctx.save(); fn(p); ctx.drawImage(im, p.x, p.y); ctx.restore(); }
function aboutPivot(px,py,rot,sx,sy,shear,tx,ty){ ctx.translate(px+tx,py+ty);
  ctx.transform(Math.cos(rot)*sx, Math.sin(rot)*sx, -Math.sin(rot)*sy+shear*sx, Math.cos(rot)*sy, 0,0);
  ctx.translate(-px,-py); }

let t0=performance.now();
function frame(now){ const t=(now-now%1)/1000, dt=1/60; const tt=(now-t0)/1000;
  // idle auto-gaze + blink
  if(!pointerActive || now-lastMove>2800){ S.tYaw=Math.sin(tt*0.5)*0.5; S.tPitch=Math.sin(tt*0.4+1)*0.25; }
  S.tYaw=Math.max(-1,Math.min(1,S.tYaw)); S.tPitch=Math.max(-1,Math.min(1,S.tPitch)); S.yaw+=(S.tYaw-S.yaw)*0.07; S.pitch+=(S.tPitch-S.pitch)*0.07; S.smile+=(S.tSmile-S.smile)*0.08;
  S.breath=Math.sin(tt*1.6); S.sway=Math.sin(tt*0.6)*0.006;
  // blink: schedule + triangular pulse
  nextBlink-=dt;
  if(nextBlink<=0){ S._bp=0.16; nextBlink=1.8+Math.random()*3.6; }
  if(S._bp>0){ S._bp-=dt; const ph=S._bp; S.blink=Math.max(0,Math.min(1, ph>0.08?(0.16-ph)/0.08:ph/0.08)); } else S.blink=0;
  // gesture (nod)
  let gYaw=0,gPitch=0;
  if(gesture){ gesture.t+=dt; const p=gesture.t;
    if(gesture.name==='nod'){ gPitch=Math.sin(p*Math.PI*2)*0.5; if(p>1)gesture=null; }
    else if(gesture.name==='shake'){ gYaw=Math.sin(p*Math.PI*4)*0.5; if(p>1)gesture=null; }
    else gesture=null; }

  ctx.setTransform(DPR,0,0,DPR,0,0); ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save(); ctx.translate(ox,oy); ctx.scale(scale,scale);
  // ground shadow
  ctx.save(); ctx.translate(786,2660); ctx.scale(1,0.14); ctx.beginPath(); ctx.arc(0,0,210,0,7); ctx.fillStyle="rgba(0,0,0,.32)"; ctx.fill(); ctx.restore();

  const yaw=S.yaw+gYaw, pitch=S.pitch+gPitch;
  const neck=L.pivots.neck, chest=L.pivots.chest, hip=L.pivots.hip;
  const bodyBob=2.4*S.breath;
  // BACK HAIR (behind everything), follows head turn a touch
  drawPart("back_hair",p=>aboutPivot(neck[0],neck[1], S.sway+yaw*0.03, 1-0.10*Math.abs(yaw),1,0.05*yaw, 22*yaw, bodyBob*0.7));
  // BODY: breathing + gentle sway
  drawPart("body",p=>aboutPivot(hip[0],hip[1], S.sway, 1, 1+0.006*S.breath, 0, 0, bodyBob));
  // HEAD group transform (pseudo-3D turn = squash + shear + shift about neck) + nod/tilt
  const headT=p=>aboutPivot(neck[0],neck[1], S.sway+yaw*0.06+pitch*0.02, 1-0.13*Math.abs(yaw),1+0.05*pitch, 0.06*yaw, 27*yaw, bodyBob*0.9+22*pitch);
  drawPart("head_base",headT);
  // EYES: head transform + blink (scale toward eye center) + tiny gaze shift
  { const p=L.eyes, im=imgs.eyes; if(im.complete){ ctx.save(); headT(p);
      const ecx=(L.pivots.eyeL[0]+L.pivots.eyeR[0])/2, ecy=L.pivots.eyeL[1];
      const b=1-S.blink; ctx.translate(ecx+6*yaw, ecy); ctx.scale(1, Math.max(0.06,b)); ctx.translate(-ecx,-ecy);
      ctx.drawImage(im,p.x,p.y); ctx.restore(); } }
  // MOUTH: head transform; talk opens a dark interior + drops lower lip; smile lifts corners
  { const p=L.mouth, im=imgs.mouth, mx=L.pivots.mouth[0], my=L.pivots.mouth[1];
    ctx.save(); headT(p);
    if(S.talk>0.02){ ctx.save(); ctx.beginPath(); ctx.ellipse(mx,my+2+6*S.talk, 30, 5+14*S.talk, 0,0,7);
      ctx.fillStyle="#3a2224"; ctx.fill(); ctx.restore(); }
    ctx.translate(mx, my+8*S.talk - 3*S.smile); ctx.translate(-mx,-my);
    ctx.drawImage(im,p.x,p.y);
    if(S.smile>0.05){ ctx.save(); ctx.globalAlpha=Math.min(0.5,S.smile); ctx.strokeStyle="#5a3a34"; ctx.lineWidth=3;
      ctx.beginPath(); ctx.moveTo(mx-34,my-1); ctx.quadraticCurveTo(mx,my-9*S.smile,mx+34,my-1); ctx.stroke(); ctx.restore(); }
    ctx.restore(); }
  ctx.restore();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body></html>
